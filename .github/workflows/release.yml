name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: pruner-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: pruner-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: pruner-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: pruner-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: pruner-windows-x86_64

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          cp pruner ../../../${{ matrix.binary }}
          cd ../../..
          tar -czf ${{ matrix.binary }}.tar.gz ${{ matrix.binary }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/pruner.exe ${{ matrix.binary }}.exe
          7z a ${{ matrix.binary }}.zip ${{ matrix.binary }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binary }}
          path: |
            ${{ matrix.binary }}.tar.gz
            ${{ matrix.binary }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip

  smoke-test:
    name: Smoke test (${{ matrix.os }})
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      # --- Install via install script ---
      - name: Install pruner (Unix)
        if: runner.os != 'Windows'
        run: |
          bash install.sh --version "${{ github.ref_name }}" --no-interactive
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install pruner (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PRUNER_VERSION: ${{ github.ref_name }}
          PRUNER_NO_INTERACTIVE: "1"
        run: |
          .\install.ps1
          echo "$env:USERPROFILE\.local\bin" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

      - name: Verify pruner is installed
        run: pruner --version

      # --- Clone test repo ---
      - name: Clone test repo
        run: git clone https://github.com/heikki-laitala/protonmail-cli.git ${{ runner.temp }}/test-repo

      # --- Init with --hook ---
      - name: Run pruner init --hook
        run: pruner init ${{ runner.temp }}/test-repo --hook

      # --- Verify init artifacts ---
      - name: Verify .pruner/index.db exists
        run: test -f ${{ runner.temp }}/test-repo/.pruner/index.db
        if: runner.os != 'Windows'
      - name: Verify .pruner/index.db exists (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path ${{ runner.temp }}/test-repo/.pruner/index.db)) { throw "index.db not found" }

      - name: Verify CLAUDE.md contains pruner section
        if: runner.os != 'Windows'
        run: grep -q "pruner context" ${{ runner.temp }}/test-repo/CLAUDE.md

      - name: Verify CLAUDE.md contains pruner section (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Select-String -Path ${{ runner.temp }}/test-repo/CLAUDE.md -Pattern "pruner context" -Quiet)) {
            throw "CLAUDE.md missing pruner section"
          }

      - name: Verify .claude/skills/pruner/SKILL.md exists
        run: test -f ${{ runner.temp }}/test-repo/.claude/skills/pruner/SKILL.md
        if: runner.os != 'Windows'
      - name: Verify .claude/skills/pruner/SKILL.md exists (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path ${{ runner.temp }}/test-repo/.claude/skills/pruner/SKILL.md)) { throw "SKILL.md not found" }

      - name: Verify hook script exists
        if: runner.os != 'Windows'
        run: test -f ${{ runner.temp }}/test-repo/.claude/hooks/pruner-context.sh

      - name: Verify hook settings.json exists
        if: runner.os != 'Windows'
        run: grep -q "UserPromptSubmit" ${{ runner.temp }}/test-repo/.claude/settings.json

      - name: Verify hook settings.json exists (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Select-String -Path ${{ runner.temp }}/test-repo/.claude/settings.json -Pattern "UserPromptSubmit" -Quiet)) {
            throw "settings.json missing hook config"
          }

      - name: Verify .gitignore contains .pruner/
        if: runner.os != 'Windows'
        run: grep -q "\.pruner/" ${{ runner.temp }}/test-repo/.gitignore

      # --- Run pruner context ---
      - name: Run pruner context (Unix)
        if: runner.os != 'Windows'
        run: |
          pruner context "${{ runner.temp }}/test-repo" "How does authentication work?" > "${{ runner.temp }}/context-output.md"
          test -s "${{ runner.temp }}/context-output.md"
          echo "--- Context output ---"
          cat "${{ runner.temp }}/context-output.md"

      - name: Run pruner context (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pruner context "${{ runner.temp }}\test-repo" "How does authentication work?" > "${{ runner.temp }}\context-output.md"
          if ((Get-Item "${{ runner.temp }}\context-output.md").Length -eq 0) { throw "context output is empty" }
          Write-Host "--- Context output ---"
          Get-Content "${{ runner.temp }}\context-output.md"

      # --- Run hook script directly (Unix only) ---
      - name: Test hook script produces output
        if: runner.os != 'Windows'
        run: |
          echo '{"prompt": "How does authentication work?"}' | \
            CLAUDE_PROJECT_DIR="${{ runner.temp }}/test-repo" \
            bash "${{ runner.temp }}/test-repo/.claude/hooks/pruner-context.sh" | \
            grep -q "Pruner context"

      # --- Test upgrade --check (tolerate GitHub API rate limits) ---
      - name: Test upgrade --check
        run: pruner upgrade --check || echo "upgrade --check failed (likely API rate limit), continuing"

      # --- Test uninstall (per-project) ---
      - name: Uninstall from test repo
        run: pruner uninstall ${{ runner.temp }}/test-repo --purge

      - name: Verify uninstall removed SKILL.md
        if: runner.os != 'Windows'
        run: test ! -f ${{ runner.temp }}/test-repo/.claude/skills/pruner/SKILL.md

      - name: Verify uninstall removed SKILL.md (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path ${{ runner.temp }}/test-repo/.claude/skills/pruner/SKILL.md) { throw "SKILL.md should be removed" }

      - name: Verify uninstall removed hook script
        if: runner.os != 'Windows'
        run: test ! -f ${{ runner.temp }}/test-repo/.claude/hooks/pruner-context.sh

      - name: Verify uninstall cleaned CLAUDE.md
        if: runner.os != 'Windows'
        run: |
          if grep -q "## Pruner" ${{ runner.temp }}/test-repo/CLAUDE.md 2>/dev/null; then
            echo "CLAUDE.md still has Pruner section"
            exit 1
          fi

      - name: Verify uninstall cleaned CLAUDE.md (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path ${{ runner.temp }}/test-repo/CLAUDE.md) {
            if (Select-String -Path ${{ runner.temp }}/test-repo/CLAUDE.md -Pattern "## Pruner" -Quiet) {
              throw "CLAUDE.md still has Pruner section"
            }
          }

      - name: Verify uninstall purged .pruner/ index
        if: runner.os != 'Windows'
        run: test ! -d ${{ runner.temp }}/test-repo/.pruner

      - name: Verify uninstall purged .pruner/ index (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path ${{ runner.temp }}/test-repo/.pruner) { throw ".pruner/ should be purged" }

      - name: Verify uninstall cleaned settings.json hook entry
        if: runner.os != 'Windows'
        run: |
          if grep -q "pruner-context" ${{ runner.temp }}/test-repo/.claude/settings.json 2>/dev/null; then
            echo "settings.json still has pruner hook"
            exit 1
          fi
